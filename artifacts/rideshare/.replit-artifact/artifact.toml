kind = "mobile"
previewPath = "/"
title = "RideShare"
version = "1.0.0"
id = "artifacts/rideshare"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/" ]
localPort = 20619

[services.development]
run = "pnpm --filter @workspace/rideshare run dev"

[services.production.build]
args = ["pnpm", "--filter", "@workspace/rideshare", "run", "build"]

[services.production.run]
args = ["pnpm", "--filter", "@workspace/rideshare", "run", "serve"]

[services.env]
PORT = "20619"
BASE_PATH = "/"
